# Filter configurations for XGBoost feature-selection experiments
#
# Each entry defines a named subset of the 7DT 20-filter mediumband set.
# The full baseline is:
#   m400 m425 m450 m475 m500 m525 m550 m575 m600 m625
#   m650 m675 m700 m725 m750 m775 m800 m825 m850 m875
#
# "19-filter" entries remove one filter at a time.
# "18-filter" entries remove one adjacent or complementary pair.

configurations:

  # ── 19-filter: single-filter ablations ──────────────────────────────────────

  - id: no_m500
    description: "20 filters minus m500"
    filters: [m400, m425, m450, m475, m525, m550, m575, m600, m625, m650, m675, m700, m725, m750, m775, m800, m825, m850, m875]

