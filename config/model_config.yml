normal_class_classifier:
  cpu:
    params_lightgbm:
      objective: multiclass
      # num_class: 9
      force_col_wise: true
      early_stopping_rounds: 30    # cross-validation에는 미적용
      device_type: cpu
      n_jobs: -1                   # 모든 CPU 사용

    params_rf:
      random_state: 42,
      n_jobs: -1                   # 모든 CPU 사용

    params_xgb:
      objective: multi:softprob
      # num_class: 9
      tree_method: hist
      random_state: 42
      n_jobs: -1                   # 모든 CPU 사용

    params_catboost:
      loss_function: MultiClass
      task_type: CPU
      random_seed: 42
      thread_count: -1                   # 모든 CPU 사용

    params_tabnet: {}
      # device_name: cpu  # fit()에서 사용 (코드에서 참고)

    params_mlp:
      random_state: 42

    params_ebm:
      random_state: 42
      max_bins: 256    # Number of bins for feature quantization (adjust as needed)
      interactions: 10 # Number of interaction terms
      n_jobs: -1                   # 모든 CPU 사용

    params_autoencoder:
      hidden_dim: 32           # Dimensionality of hidden layer
      latent_dim: 16           # Dimensionality of latent representation
      learning_rate: 1e-3      # Learning rate
      batch_size: 128          # Mini-batch size
      num_epochs: 100          # Number of training epochs
      seed: 42                 # Random seed for reproducibility
      # framework and architecture details are defined in code

  gpu:
    params_lightgbm:
      objective: multiclass
      # num_class: 9
      force_col_wise: true
      early_stopping_rounds: 30    # cross-validation에는 미적용
      device_type: gpu
      n_jobs: -1

    params_rf:
      random_state: 42    # sklearn RF는 GPU 미지원, CPU 동작

    params_xgb:
      objective: multi:softprob
      # num_class: 9
      tree_method: gpu_hist
      random_state: 42

    params_catboost:
      loss_function: MultiClass
      task_type: GPU
      devices: "0"        # 0번 GPU 사용 (필요시)
      random_seed: 42

    params_tabnet: {}
      # device_name: cuda  # fit()에서 사용 (코드에서 참고)

    params_mlp:
      random_state: 42

    params_ebm:
      random_state: 42
      max_bins: 256    # Number of bins for feature quantization (adjust as needed)
      interactions: 10 # Number of interaction terms

    params_autoencoder:
      hidden_dim: 32           # Dimensionality of hidden layer
      latent_dim: 16           # Dimensionality of latent representation
      learning_rate: 1e-3      # Learning rate
      batch_size: 128          # Mini-batch size
      num_epochs: 100          # Number of training epochs
      seed: 42                 # Random seed for reproducibility
      # framework and architecture details are defined in code